<!DOCTYPE html>
<html>

<head>
    <title>فرم با ذخیره‌سازی (آموزشی)</title>
</head>

<body>
    <h2>ثبت‌نام با ذخیره‌سازی</h2>
    <form id="storedForm">
        <input type="text" id="username" placeholder="نام کاربری">
        <textarea id="bio" placeholder="بیوگرافی"></textarea>
        <button type="submit">ثبت</button>
    </form>
    <div id="users"></div>

    <script>
        // ذخیره‌سازی در localStorage (شبیه‌سازی پایگاه داده)
        function loadUsers() {
            const data = localStorage.getItem('users');
            return data ? JSON.parse(data) : [];
        }

        function saveUsers(users) {
            localStorage.setItem('users', JSON.stringify(users));
        }

        function displayUsers() {
            const users = loadUsers();
            const output = document.getElementById('users');
            output.innerHTML = '<h3>لیست کاربران</h3>';

            users.forEach((user, index) => {
                // ⚠️ آسیب‌پذیر: استفاده از innerHTML با داده ذخیره‌شده
                const div = document.createElement('div');
                div.innerHTML = `
                    <p><strong>${user.username}</strong></p>
                    <p>بیو: ${user.bio}</p>
                    <hr>
                `;
                output.appendChild(div);
            });
        }

        document.getElementById('storedForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const bio = document.getElementById('bio').value;

            const users = loadUsers();
            users.push({ username, bio });
            saveUsers(users);

            displayUsers();

            // پاک کردن فرم
            document.getElementById('username').value = '';
            document.getElementById('bio').value = '';
        });

        // نمایش کاربران موجود
        displayUsers();
    </script>
</body>

</html>
